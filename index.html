<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UEFA Champions League Table</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:
radial-gradient(circle at top,#143b9c 0%,#07173d 35%,#020812 100%);
color:white;
padding:30px;
min-height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(white 1px,transparent 1px);
background-size:70px 70px;
opacity:.08;
pointer-events:none;
}

/* Back Button */

#backBtn{
position:fixed;
top:20px;
left:20px;
padding:12px 22px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#004bff,#00b8ff);
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
box-shadow:0 0 20px rgba(0,140,255,.5);
transition:.25s;
z-index:1000;
}

#backBtn:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(0,170,255,.8);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header img{
width:120px;
margin-bottom:15px;
filter:
drop-shadow(0 0 8px #3da8ff)
drop-shadow(0 0 20px #005eff);
}

.header h1{
font-size:42px;
letter-spacing:3px;
text-transform:uppercase;
}

.header p{
margin-top:8px;
color:#d9e6ff;
}

.table-box{
max-width:1350px;
margin:auto;
overflow:hidden;
border-radius:20px;
background:rgba(10,20,55,.75);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 35px rgba(0,120,255,.35);
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:linear-gradient(90deg,#003cff,#00b3ff);
}

th{
padding:14px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

tbody tr:hover{
background:rgba(255,255,255,.06);
}

.clubCell{
display:flex;
align-items:center;
gap:12px;
font-weight:600;
text-align:left;
}

.clubCell img{
width:34px;
height:34px;
object-fit:contain;
}

.top8{
border-left:6px solid #2dff8a;
}

.playoff{
border-left:6px solid #ffd447;
}

.out{
border-left:6px solid #ff5555;
}

.legend{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.legend div{
display:flex;
align-items:center;
gap:8px;
}

.color{
width:16px;
height:16px;
border-radius:4px;
}
  

.green{background:#2dff8a;}
.yellow{background:#ffd447;}
.red{background:#ff5555;}
  #matchesBtn{
    position:fixed;
    top:20px;
    right:20px;
    z-index:1000;
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#005eff,#00b3ff);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,120,255,.5);
    transition:.25s;
}

#matchesBtn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(0,170,255,.8);
}

</style>

</head>

<body>

<button id="backBtn">← Back to Clubs</button>
<button id="matchesBtn">Matches →</button>

<div class="header">

<img src="https://cdn-img.staticzz.com/img/logos/competicoes/27_imgbank_lc_20250314102703.png">

<h1>UEFA Champions League</h1>

<p>League Phase • 36 Clubs</p>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>#</th>
<th style="text-align:left;">Club</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<div class="legend">
<div><span class="color green"></span>Round of 16</div>
<div><span class="color yellow"></span>Knockout Play-offs</div>
<div><span class="color red"></span>Eliminated</div>
</div>

<script>

const clubs = JSON.parse(localStorage.getItem("uclTeams")) || [];
const results = JSON.parse(localStorage.getItem("uclResults")) || [];

const tbody = document.getElementById("tableBody");

// Create stats
const table = {};

clubs.forEach(club => {
    table[club.name] = {
        name: club.name,
        logo: club.logo,
        P: 0,
        W: 0,
        D: 0,
        L: 0,
        GF: 0,
        GA: 0,
        GD: 0,
        Pts: 0
    };
});

// Process results safely
results.forEach(match => {

    if (!match || !match.home || !match.away) return;

    const home = table[match.home.name];
    const away = table[match.away.name];

    if (!home || !away) return;

    const hg = Number(match.hg) || 0;
    const ag = Number(match.ag) || 0;

    home.P++;
    away.P++;

    home.GF += hg;
    home.GA += ag;

    away.GF += ag;
    away.GA += hg;

    if (hg > ag) {

        home.W++;
        home.Pts += 3;

        away.L++;

    } else if (hg < ag) {

        away.W++;
        away.Pts += 3;

        home.L++;

    } else {

        home.D++;
        away.D++;

        home.Pts++;
        away.Pts++;

    }

});

// Goal Difference
Object.values(table).forEach(club => {
    club.GD = club.GF - club.GA;
});

// Sort table
const standings = Object.values(table).sort((a,b)=>{

    if (b.Pts !== a.Pts)
        return b.Pts - a.Pts;

    if (b.GD !== a.GD)
        return b.GD - a.GD;

    return b.GF - a.GF;

});

// Draw table
tbody.innerHTML = "";

if (standings.length === 0) {

    tbody.innerHTML = `
    <tr>
        <td colspan="10" style="padding:40px;font-size:18px;">
            No clubs selected.<br><br>
            Go back to the club selection page and choose up to 36 clubs.
        </td>
    </tr>
    `;

} else {

    standings.forEach((club,index)=>{

        let cls = "out";

        if(index < 8)
            cls = "top8";
        else if(index < 24)
            cls = "playoff";

        tbody.innerHTML += `
        <tr class="${cls}">

            <td>${index+1}</td>

            <td>
                <div class="clubCell">
                    <img src="${club.logo}" alt="">
                    <span>${club.name}</span>
                </div>
            </td>

            <td>${club.P}</td>
            <td>${club.W}</td>
            <td>${club.D}</td>
            <td>${club.L}</td>
            <td>${club.GF}</td>
            <td>${club.GA}</td>
            <td>${club.GD}</td>
            <td><b>${club.Pts}</b></td>

        </tr>
        `;

    });

}

// Buttons
document.getElementById("backBtn").addEventListener("click", function () {
    window.location.href = "clubs.html";
});

document.getElementById("matchesBtn").addEventListener("click", function () {
    window.location.href = "matches.html";
});

</script>




</body>
</html>
